name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm typecheck

  build-studio:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: postgresql://app:app@localhost:5432/builder_test
      PAYLOAD_SECRET: test-ci-test-ci-test-ci-test-ci-secret-32
      SITE_URL: http://localhost:3000
      PREVIEW_SECRET: ci-preview-secret-32-characters-minimum-here
      BLOB_READ_WRITE_TOKEN: ci-blob-read-write-token-placeholder
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d builder_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @repo/gateway build
      - run: pnpm --filter @repo/studio build

  e2e:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d builder_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      POSTGRES_URL: postgresql://app:app@localhost:5432/builder_test
      PAYLOAD_SECRET: test-ci-test-ci-test-ci-test-ci-secret-32
      SITE_URL: http://localhost:3000
      PREVIEW_SECRET: ci-preview-secret-32-characters-minimum-here
      BLOB_READ_WRITE_TOKEN: ci-blob-read-write-token-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Install Playwright Chromium
        run: pnpm --filter @repo/studio exec playwright install chromium --with-deps
      - run: pnpm --filter @repo/studio run test:e2e

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d builder_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://app:app@localhost:5432/builder_test
      PAYLOAD_SECRET: test-ci-test-ci-test-ci-test-ci-secret-32
      SITE_URL: http://localhost:3000
      PREVIEW_SECRET: ci-preview-secret-32-characters-minimum-here
      BLOB_READ_WRITE_TOKEN: ci-blob-read-write-token-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm test
