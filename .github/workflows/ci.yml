name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d builder_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://app:app@localhost:5432/builder_test
      PAYLOAD_SECRET: test-ci-test-ci-test-ci-test-ci-secret-32
      SITE_URL: http://localhost:3000
      PREVIEW_SECRET: ci-preview-secret-32-characters-minimum-here
      BLOB_READ_WRITE_TOKEN: ci-blob-read-write-token-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - name: Apply Payload migrations
        run: pnpm --filter @repo/studio exec payload migrate
      - name: Re-run migrations (stability / idempotency check)
        run: pnpm --filter @repo/studio exec payload migrate
      - run: pnpm test

