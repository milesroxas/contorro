# Postgres only (see AGENTS.md and docs/app/system-runtime.md).
# Project name fixes container/volume scope; host port defaults to 54332 so :5432 can stay free.
name: contorro

services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "${CONTORRO_DB_PORT:-54332}:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: builder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d builder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
